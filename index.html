<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B1018;
    --surface:#141B27;
    --surface-2:#1B2433;
    --border:#28344A;
    --text:#EDEAE3;
    --text-muted:#8B96A8;
    --gold:#E8A23D;
    --green:#3DDC84;
    --coral:#E8543D;
    --blue:#4D9DE0;
    --radius:10px;
    --font-display:'Big Shoulders Display',sans-serif;
    --font-body:'Inter',-apple-system,sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;}
  button{font-family:var(--font-body);}
  #app{display:flex;flex-direction:column;min-height:100vh;}

  /* ---- Ticker ---- */
  .ticker{height:34px;overflow:hidden;background:var(--surface-2);border-bottom:1px solid var(--border);position:relative;}
  .ticker-track{display:flex;align-items:center;height:34px;white-space:nowrap;width:max-content;animation:scrollLeft 28s linear infinite;}
  .ticker:hover .ticker-track{animation-play-state:paused;}
  @keyframes scrollLeft{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .ticker-item{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.03em;color:var(--text-muted);padding:0 22px;border-right:1px solid var(--border);}
  .ticker-item b{color:var(--gold);font-weight:600;}
  .ticker-item span.up{color:var(--green);}

  /* ---- Shell ---- */
  .shell{display:flex;flex:1;}
  .sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:18px 10px;display:flex;flex-direction:column;gap:4px;}
  .brand{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:.02em;text-transform:uppercase;color:var(--text);padding:4px 10px 18px;}
  .brand span{color:var(--gold);}
  .navbtn{display:flex;align-items:center;gap:10px;text-align:left;width:100%;background:transparent;border:none;border-left:3px solid transparent;color:var(--text-muted);padding:10px 10px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;}
  .navbtn:hover{background:var(--surface-2);color:var(--text);}
  .navbtn.active{background:var(--surface-2);color:var(--text);border-left:3px solid var(--gold);}
  .navbtn .ic{font-size:16px;width:20px;text-align:center;}

  .main{flex:1;padding:28px 30px 60px;max-width:1140px;width:100%;}
  .pagehead{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;gap:12px;flex-wrap:wrap;}
  .pagehead h1{font-family:var(--font-display);font-weight:800;font-size:26px;letter-spacing:.01em;text-transform:uppercase;margin:0 0 4px;}
  .pagehead p{margin:0;color:var(--text-muted);font-size:13px;}
  .ghostbtn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:8px 13px;border-radius:6px;cursor:pointer;font-size:12.5px;white-space:nowrap;}
  .ghostbtn:hover{color:var(--coral);border-color:var(--coral);}

  /* ---- Cards ---- */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:26px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
  .card .label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:8px;}
  .card .value{font-family:var(--font-mono);font-size:25px;font-weight:600;color:var(--text);}
  .card.gold .value{color:var(--gold);}
  .card.green .value{color:var(--green);}

  /* ---- Sections ---- */
  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px;}
  .section h2{font-family:var(--font-display);font-size:15px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;margin:0 0 14px;color:var(--text);}
  .section h2 small{font-family:var(--font-body);text-transform:none;color:var(--text-muted);font-weight:400;letter-spacing:0;}

  /* ---- Bars ---- */
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .bar-label{width:110px;flex-shrink:0;font-size:12.5px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bar-track{flex:1;height:9px;background:var(--surface-2);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;}
  .bar-value{width:auto;min-width:78px;text-align:right;font-family:var(--font-mono);font-size:12px;color:var(--text);}

  /* ---- Forms ---- */
  .form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:18px;padding:14px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);}
  .field{display:flex;flex-direction:column;gap:4px;}
  .field label{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);}
  input,select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;font-family:var(--font-body);}
  input[type=color]{padding:3px;width:42px;height:36px;cursor:pointer;}
  input[type=date]{font-family:var(--font-body);}
  input:focus,select:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .primarybtn{background:var(--gold);color:#181206;font-weight:700;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-size:13px;}
  .primarybtn:hover{filter:brightness(1.08);}
  .swatches{display:flex;gap:6px;}
  .swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.selected{border-color:var(--text);}

  /* ---- Rows ---- */
  .row{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;margin-bottom:8px;flex-wrap:wrap;}
  .row.col{flex-direction:column;align-items:stretch;}
  .dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
  .rowname{font-weight:600;font-size:13.5px;min-width:120px;}
  .rowmeta{font-size:12px;color:var(--text-muted);}
  .grow{flex:1;min-width:120px;}
  .badge{font-size:10.5px;padding:3px 9px;border-radius:20px;background:var(--surface-2);color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;}
  .badge.ok{background:rgba(61,220,132,.15);color:var(--green);}
  .badge.warn{background:rgba(232,162,61,.15);color:var(--gold);}
  .iconbtn{background:transparent;border:1px solid var(--border);color:var(--text-muted);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:13px;flex-shrink:0;}
  .iconbtn:hover{color:var(--coral);border-color:var(--coral);}
  .smallnum{width:62px;text-align:center;}
  .miniadd{background:var(--surface-2);border:1px solid var(--border);color:var(--text);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:13px;}
  .miniadd:hover{border-color:var(--green);color:var(--green);}
  .stat{font-family:var(--font-mono);font-size:13px;}
  .stat .l{color:var(--text-muted);font-size:10.5px;display:block;font-family:var(--font-body);}
  .tplhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;}
  .ta{width:100%;min-height:64px;resize:vertical;font-family:var(--font-body);line-height:1.4;}
  .tplactions{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .adtext{white-space:pre-wrap;font-size:13px;line-height:1.55;color:var(--text);margin:6px 0 10px;}
  .adtitle{font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:.01em;color:var(--gold);margin:0 0 6px;}
  .loadingline{color:var(--text-muted);font-family:var(--font-mono);font-size:12.5px;padding:14px 0;}

  /* ---- Empty state ---- */
  .empty{text-align:center;padding:40px 18px;border:1px dashed var(--border);border-radius:var(--radius);color:var(--text-muted);}
  .empty h3{color:var(--text);font-family:var(--font-display);text-transform:uppercase;letter-spacing:.02em;margin:0 0 6px;}
  .steps{list-style:none;padding:0;margin:18px 0 0;max-width:380px;margin-left:auto;margin-right:auto;text-align:left;}
  .steps li{display:flex;gap:12px;align-items:flex-start;padding:8px 0;font-size:13px;color:var(--text);}
  .step-num{background:var(--gold);color:#181206;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;}

  /* ---- Toast ---- */
  .toast{position:fixed;bottom:18px;right:18px;background:var(--surface-2);border:1px solid var(--green);color:var(--green);padding:8px 14px;border-radius:6px;font-size:12px;font-family:var(--font-mono);opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;transform:translateY(0);}

  a.linklike{color:var(--blue);text-decoration:none;font-size:12px;}
  a.linklike:hover{text-decoration:underline;}

  /* ---- Mobile ---- */
  @media (max-width:760px){
    .shell{flex-direction:column;}
    .sidebar{flex-direction:row;width:100%;height:auto;border-right:none;border-top:1px solid var(--border);position:fixed;bottom:0;left:0;right:0;justify-content:space-around;padding:6px;background:var(--surface);z-index:20;}
    .brand{display:none;}
    .navbtn{flex-direction:column;gap:2px;font-size:10.5px;flex:1;border-left:none;border-top:3px solid transparent;padding:6px 2px;}
    .navbtn.active{border-top:3px solid var(--gold);border-left:none;}
    .main{padding:20px 16px 90px;}
    .row{flex-direction:column;align-items:stretch;}
    .rowname{min-width:0;}
  }
</style>

function uid(){ return 'id'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtBRL(n){ return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(n||0); }
function fmtPct(n){ return (isFinite(n)?n:0).toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+'%'; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function getId(el){ const r=el.closest('[data-id]'); return r?r.dataset.id:null; }

async function loadData(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      state = JSON.parse(raw);
      if(!Array.isArray(state.templates)) state.templates = [];
      if(!state.settings) state.settings = { linkPadrao:'' };
    } else {
      state.templates = defaultTemplates();
    }
  }catch(e){ state.templates = defaultTemplates(); }
}
async function saveData(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    const t = document.getElementById('toast');
    if(t){ t.classList.add('show'); clearTimeout(window._toastTimer); window._toastTimer=setTimeout(()=>t.classList.remove('show'),1200); }
  }catch(e){ console.error('Erro ao salvar dados', e); }
}

let lastAds = [];

async function generateAds(){
  const produto = document.getElementById('ad-produto').value.trim();
  const beneficio = document.getElementById('ad-beneficio').value.trim();
  const publico = document.getElementById('ad-publico').value.trim();
  const tom = document.getElementById('ad-tom').value;
  const qtd = document.getElementById('ad-qtd').value;
  const out = document.getElementById('ads-output');
  const btn = document.getElementById('ad-gerar-btn');

  if(!produto || !beneficio){
    out.innerHTML = '<div class="loadingline">Preencha pelo menos o produto e o principal benefício.</div>';
    return;
  }

  btn.disabled = true; btn.textContent = 'Gerando...';
  out.innerHTML = '<div class="loadingline">Gerando suas legendas, só um instante…</div>';

  const userPrompt = `Produto: ${produto}\nPrincipal benefício / o que resolve: ${beneficio}\nPúblico-alvo: ${publico || 'não especificado'}\nTom desejado: ${tom}\nGere ${qtd} variações de legenda para post/anúncio de Facebook.`;

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: "Você é um copywriter especializado em legendas para posts e anúncios de Facebook, na área de marketing de afiliados (frequentemente nicho de saúde e bem-estar). Regras que você SEMPRE segue, para respeitar as políticas de anúncios do Facebook e proteger o usuário de problemas: nunca prometa cura, nunca garanta resultado específico (peso, prazo, dinheiro), nunca use linguagem alarmista ou que ataque atributos pessoais do leitor (corpo, aparência, situação financeira), nunca invente estatísticas. Use tom pessoal e honesto ('eu testei', 'no meu caso'), sempre termine com uma chamada para ação clara. NÃO inclua links nem hashtags. Responda APENAS com um array JSON puro, sem markdown, sem texto antes ou depois, neste formato exato: [{\"titulo\":\"gancho curto de até 8 palavras\",\"texto\":\"corpo da legenda, até 4 frases curtas\"}]",
        messages: [{ role: "user", content: userPrompt }]
      })
    });
    const data = await response.json();
    const rawText = (data.content || []).map(b => b.text || '').join('');
    const cleaned = rawText.replace(/```json|```/g, '').trim();
    const ads = JSON.parse(cleaned);
    if(!Array.isArray(ads) || ads.length===0){ throw new Error('formato inesperado'); }
    lastAds = ads;
    renderAdsOutput();
  }catch(e){
    console.error('Erro ao gerar anúncios', e);
    out.innerHTML = '<div class="loadingline">Não foi possível gerar agora. Tente novamente em alguns segundos.</div>';
  }finally{
    btn.disabled = false; btn.textContent = 'Gerar legendas';
  }
}

function renderAdsOutput(){
  const out = document.getElementById('ads-output');
  if(!out) return;
  out.innerHTML = lastAds.map((ad, idx) => `
    <div class="row col" data-idx="${idx}">
      <div class="adtitle">${esc(ad.titulo)}</div>
      <div class="adtext">${esc(ad.texto)}</div>
      <div class="tplactions">
        <button class="primarybtn" onclick="copyAdText(this)">Copiar</button>
        <button class="ghostbtn" onclick="saveAdAsTemplate(this)">+ Salvar em Respostas Rápidas</button>
      </div>
    </div>
  `).join('');
}
function getIdx(el){ return parseInt(el.closest('[data-idx]').dataset.idx, 10); }
function copyAdText(btn){
  const idx = getIdx(btn); const ad = lastAds[idx]; if(!ad) return;
  const link = (state.settings.linkPadrao||'').trim();
  const text = ad.texto + (link ? `\n\n${link}` : '');
  navigator.clipboard && navigator.clipboard.writeText(text).catch(()=>{});
  const old = btn.textContent; btn.textContent='Copiado!';
  setTimeout(()=>{ btn.textContent = old; }, 1200);
}
function saveAdAsTemplate(btn){
  const idx = getIdx(btn); const ad = lastAds[idx]; if(!ad) return;
  state.templates.push({ id: uid(), titulo: ad.titulo, texto: ad.texto + '\n\n{link}' });
  saveData();
  const old = btn.textContent; btn.textContent='Salvo!';
  setTimeout(()=>{ btn.textContent = old; }, 1200);
}

/* ===================== UTIL: dados derivados ===================== */
function platformById(id){ return state.platforms.find(p=>p.id===id); }
function linksOf(platformId){ return state.links.filter(l=>l.platformId===platformId); }
function totals(){
  return state.links.reduce((acc,l)=>{
    acc.cliques += l.cliques||0; acc.vendas += l.vendas||0; acc.comissao += l.comissaoTotal||0; return acc;
  }, {cliques:0,vendas:0,comissao:0});
}
function comissaoPorPlataforma(){
  return state.platforms.map(p=>{
    const ls = linksOf(p.id);
    const comissao = ls.reduce((s,l)=>s+(l.comissaoTotal||0),0);
    const vendas = ls.reduce((s,l)=>s+(l.vendas||0),0);
    return { p, comissao, vendas };
  }).sort((a,b)=>b.comissao-a.comissao);
}

function exportBackup(){
  try{
    const dataStr = JSON.stringify(state, null, 2);
    const blob = new Blob([dataStr], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = todayISO();
    a.href = url;
    a.download = `backup-painel-afiliado-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
  }catch(e){ alert('Não foi possível exportar o backup.'); }
}
function handleImportFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      if(!parsed || !Array.isArray(parsed.platforms) || !Array.isArray(parsed.links) || !Array.isArray(parsed.posts)){
        alert('Esse arquivo não parece ser um backup válido do Painel do Afiliado.');
        return;
      }
      if(!confirm('Importar este backup vai substituir todos os dados atuais. Continuar?')) return;
      state = parsed;
      saveData(); render();
    }catch(err){
      alert('Não foi possível ler este arquivo de backup.');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

      <div class="field"><label>Produto</label><input id="nl-produto" type="text" placeholder="Ex: Curso X" style="width:160px;"></div>
      <div class="field"><label>URL do link</label><input id="nl-url" type="text" placeholder="https://..." style="width:200px;"></div>
      <div class="field"><label>Comissão %</label><input id="nl-percent" type="number" min="0" step="0.1" style="width:70px;"></div>
      <button class="primarybtn" onclick="addLink()">+ Adicionar</button>
    </div>

    ${state.links.length===0 ? '<div class="empty"><h3>Nenhum link ainda</h3><p>Adicione seu primeiro link de afiliado acima.</p></div>' :
      state.links.map(l=>{
        const p = platformById(l.platformId);
        const conv = (l.cliques>0) ? (l.vendas/l.cliques*100) : 0;
        return `<div class="row" data-id="${l.id}">
          <span class="dot" style="background:${p?p.cor:'#888'}"></span>
          <input class="grow" style="min-width:140px;" type="text" value="${esc(l.produto)}" onchange="setLinkText(this,'produto')">
          <span class="rowmeta" style="min-width:70px;">${p?esc(p.nome):'—'}</span>
          ${l.url ? `<button class="ghostbtn" data-url="${esc(l.url)}" onclick="copyUrl(this)">Copiar link</button>` : ''}
          <div class="stat"><span class="l">Cliques</span>
            <input class="smallnum" type="number" value="${l.cliques}" onchange="setLinkField(this,'cliques')">
          </div>
          <button class="miniadd" title="+1 clique" onclick="incLink(this,'cliques')">+1</button>
          <div class="stat"><span class="l">Vendas</span>
            <input class="smallnum" type="number" value="${l.vendas}" onchange="setLinkField(this,'vendas')">
          </div>
          <button class="miniadd" title="+1 venda" onclick="incLink(this,'vendas')">+1</button>
          <div class="stat"><span class="l">Comissão R$</span>
            <input class="smallnum" type="number" step="0.01" value="${l.comissaoTotal}" onchange="setLinkField(this,'comissaoTotal')">
          </div>
          <div class="stat"><span class="l">Conversão</span>${fmtPct(conv)}</div>
          <span class="badge ${l.status==='ativo'?'ok':'warn'}" style="cursor:pointer;" onclick="toggleLinkStatus(this)">${l.status}</span>
          <button class="iconbtn" onclick="delLink(this)">✕</button>
        </div>`;
      }).join('')}
  `;
}

/* ===================== RENDER: CALENDÁRIO ===================== */
function linkOptions(){
  if(state.links.length===0) return '<option value="">Nenhum link cadastrado</option>';
  return '<option value="">— Sem link associado —</option>' + state.links.map(l=>{
    const p = platformById(l.platformId);
    return `<option value="${l.id}">${esc(l.produto)} (${p?esc(p.nome):'—'})</option>`;
  }).join('');
}
function canalOptions(){
  return CANAIS.map(c=>`<option value="${c}">${c}</option>`).join('');
}
function renderCalendar(){
  const sorted = [...state.posts].sort((a,b)=>a.data.localeCompare(b.data));
  return `
    <div class="pagehead"><div><h1>Calendário de Conteúdo</h1><p>Planeje suas postagens de divulgação por canal</p></div></div>

    <div class="form-row">
      <div class="field"><label>Data</label><input id="np2-data" type="date" value="${todayISO()}"></div>
      <div class="field"><label>Canal</label><select id="np2-canal">${canalOptions()}</select></div>
      <div class="field"><label>Link (opcional)</label><select id="np2-link" style="width:200px;">${linkOptions()}</select></div>
      <div class="field"><label>Título / ideia</label><input id="np2-titulo" type="text" placeholder="Ex: Reels de unboxing" style="width:200px;" onkeydown="if(event.key==='Enter')addPost()"></div>
      <button class="primarybtn" onclick="addPost()">+ Agendar</button>
    </div>

    ${sorted.length===0 ? '<div class="empty"><h3>Nenhum conteúdo agendado</h3><p>Agende sua primeira postagem acima.</p></div>' :
      sorted.map(post=>{
        const l = post.linkId ? state.links.find(x=>x.id===post.linkId) : null;
        return `<div class="row" data-id="${post.id}">
          <span class="rowmeta" style="min-width:46px;font-family:var(--font-mono);">${formatDataPt(post.data)}</span>
          <span class="badge warn">${esc(post.canal)}</span>
          <input class="grow" style="min-width:140px;" type="text" value="${esc(post.titulo)}" onchange="setLinkTextGeneric(this)">
          ${l ? `<span class="rowmeta">↳ ${esc(l.produto)}</span>` : ''}
          <span class="badge ${post.status==='publicado'?'ok':'warn'}" style="cursor:pointer;" onclick="togglePostStatus(this)">${post.status}</span>
          <button class="iconbtn" onclick="delPost(this)">✕</button>
        </div>`;
      }).join('')}
  `;
}
function setLinkTextGeneric(input){
  const id = getId(input); const p = state.posts.find(x=>x.id===id); if(!p) return;
  p.titulo = input.value; saveData(); render();
}

/* ===================== RENDER: GERADOR DE ANÚNCIOS (IA) ===================== */
function renderAnuncios(){
  return `
    <div class="pagehead"><div><h1>Gerador de Anúncios</h1><p>Uma IA escreve legendas pra você postar no Facebook (ou Instagram)</p></div></div>

    <div class="section">
      <h2>Conte sobre o produto</h2>
      <div class="field" style="margin-bottom:8px;">
        <label>Produto</label>
        <input id="ad-produto" type="text" placeholder="Ex: Curso de alongamento matinal" style="width:100%;">
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label>Principal benefício / o que resolve</label>
        <input id="ad-beneficio" type="text" placeholder="Ex: ajuda a relaxar o corpo antes de dormir" style="width:100%;">
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label>Público (opcional)</label>
        <input id="ad-publico" type="text" placeholder="Ex: mulheres 30-50 anos com rotina cansativa" style="width:100%;">
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
        <div class="field">
          <label>Tom</label>
          <select id="ad-tom">
            <option value="empático e pessoal">Empático</option>
            <option value="direto e objetivo">Direto</option>
            <option value="bem-humorado">Bem-humorado</option>
            <option value="urgência de promoção, sem ser apelativo">Promoção</option>
          </select>
        </div>
        <div class="field">
          <label>Quantas variações</label>
          <select id="ad-qtd"><option value="3">3</option><option value="5">5</option></select>
        </div>
      </div>
      <button class="primarybtn" id="ad-gerar-btn" onclick="generateAds()">Gerar legendas</button>
      <div class="rowmeta" style="margin-top:10px;">A IA evita prometer cura ou resultado garantido, e não usa linguagem alarmista — assim seu anúncio fica dentro das regras do Facebook.</div>
    </div>

    <div id="ads-output">${lastAds.length ? '' : '<div class="loadingline">Preencha os campos acima e gere suas primeiras legendas.</div>'}</div>
  `;
}

/* ===================== RENDER: RESPOSTAS RÁPIDAS ===================== */
function renderTemplates(){
  return `
    <div class="pagehead"><div><h1>Respostas Rápidas</h1><p>Textos prontos pra copiar e colar quando alguém te manda mensagem</p></div></div>

    <div class="form-row">
      <div class="field" style="flex:1;min-width:220px;">
        <label>Seu link padrão (substitui {link} nos textos abaixo)</label>
        <input id="link-padrao" type="text" placeholder="https://..." value="${esc(state.settings.linkPadrao||'')}" onchange="setLinkPadrao(this)" style="width:100%;">
      </div>
    </div>

    <div class="section">
      <h2>Adicionar nova resposta</h2>
      <div class="field" style="margin-bottom:8px;">
        <label>Título (pra você identificar)</label>
        <input id="nt-titulo" type="text" placeholder="Ex: Perguntou o preço" style="width:100%;">
      </div>
      <div class="field" style="margin-bottom:8px;">
        <label>Texto da resposta — use {link} onde quiser que o link entre</label>
        <textarea id="nt-texto" class="ta" placeholder="Escreva aqui... use {link} onde o link deve aparecer"></textarea>
      </div>
      <button class="primarybtn" onclick="addTemplate()">+ Adicionar resposta</button>
    </div>

    ${state.templates.length===0 ? '<div class="empty"><h3>Nenhuma resposta ainda</h3><p>Adicione a primeira acima.</p></div>' :
      state.templates.map(t=>`
        <div class="row col" data-id="${t.id}">
          <div class="tplhead">
            <input class="rowname grow" type="text" value="${esc(t.titulo)}" onchange="setTemplateField(this,'titulo')">
            <button class="iconbtn" onclick="delTemplate(this)">✕</button>
          </div>
          <textarea class="ta" onchange="setTemplateField(this,'texto')">${esc(t.texto)}</textarea>
          <div class="tplactions">
            <button class="primarybtn" onclick="copyTemplate(this)">Copiar com meu link</button>
          </div>
        </div>
      `).join('')}
  `;
}

/* ===================== RENDER PRINCIPAL ===================== */
function render(){
  const views = { dashboard: renderDashboard, platforms: renderPlatforms, links: renderLinks, calendar: renderCalendar, ads: renderAnuncios, templates: renderTemplates };
  document.getElementById('app').innerHTML = `
    ${renderTicker()}
    <div class="shell">
      ${renderSidebar()}
      <div class="main">${views[currentView]()}</div>
    </div>
  `;
}

(async function init(){
  await loadData();
  render();
})();
</script>
</body>
</html>
